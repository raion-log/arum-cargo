name: wiki-ingest-daily

on:
  # 매일 07:00 KST = 22:00 UTC (전일)
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    concurrency:
      group: wiki-ingest
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/wiki-ingest/package-lock.json

      - name: Install scraper deps
        working-directory: scripts/wiki-ingest
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Run scraper
        working-directory: scripts/wiki-ingest
        env:
          TZ: Asia/Seoul
        run: node run.js

      - name: Commit new inbox drops
        env:
          GIT_AUTHOR_NAME: wiki-ingest-bot
          GIT_AUTHOR_EMAIL: wiki-ingest-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: wiki-ingest-bot
          GIT_COMMITTER_EMAIL: wiki-ingest-bot@users.noreply.github.com
        run: |
          git add raw/inbox scripts/wiki-ingest/.state/seen-urls.json
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          COUNT=$(git diff --cached --name-only -- raw/inbox | wc -l | tr -d ' ')
          git commit -m "chore(wiki-ingest): ${COUNT} new items $(date -u +%Y-%m-%d)"
          git push
